name: Build & Release Dollops Admin

on:
  workflow_dispatch:  # Allows manual triggering from GitHub Actions tab
  release:
    types: [published]

jobs:

  # ---- BUILD FOR WINDOWS ----
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build -- --win --x64 --publish always

  # ---- BUILD FOR MAC ----
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac installer (Intel + Apple Silicon)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build -- --mac --x64 --arm64 --publish always